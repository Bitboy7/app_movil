name: app_movil
description: "Routine tracker with an evolving pet companion."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1
  go_router: ^14.8.1
  uuid: ^4.5.1
  intl: ^0.19.0
  flutter_animate: ^4.5.2
  google_fonts: ^6.2.1
  shared_preferences: ^2.3.4
  hive_flutter: ^1.1.0
  image_picker: ^1.2.2
  path_provider: ^2.1.5
  lottie: ^3.3.1
  font_awesome_flutter: ^10.8.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  riverpod_generator: ^2.6.3
  build_runner: ^2.4.13

flutter:
  uses-material-design: true

  assets:
    - assets/lottie/
